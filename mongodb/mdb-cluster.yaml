crVersion: "1.22.0"

finalizers:
  - percona.com/delete-psmdb-pods-in-order

secrets:
  users: mongodb-system-secrets

users:
  - name: me2me-awl
    db: me2me-awl
    passwordSecretRef:
      name: mongodb-me2me-awl-user
      key: password
    roles:
      - name: readWrite
        db: me2me-awl
      - name: dbAdmin
        db: me2me-awl

replsets:
  rs0:
    size: 1

    livenessProbe:
      failureThreshold: 6
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 30

    readinessProbe:
      failureThreshold: 10
      initialDelaySeconds: 60
      periodSeconds: 30
      successThreshold: 1
      timeoutSeconds: 15

    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

    volumeSpec:
      pvc:
        resources:
          requests:
            storage: 10Gi

    affinity:
      antiAffinityTopologyKey: "none"

    expose:
      enabled: false
      exposeType: ClusterIP

sharding:
  enabled: false

backup:
  enabled: false

tls:
  mode: disabled

pmm:
  enabled: false

unsafeFlags:
  replsetSize: true
  tls: true
  mongosSize: false
  terminationGracePeriod: false
  backupIfUnhealthy: false