replicaCount: 1

image:
  repository: ghcr.io/redpeppersnest/me2me-awl-be
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-creds
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

service:
  type: NodePort
  port: 3000

resources:
    limits:
        cpu: 1000m
        memory: 512Mi
    requests:
        cpu: 256m
        memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/
    port: http
readinessProbe:
  httpGet:
    path: /api/
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: false

jwtAuth:
  enabled: true
  keyPair:
    secretName: me2me-awl-be-jwt-keys

mongoDB:
  enabled: true
  secretName: me2me-awl-be-mongodb-user

tmdbApiKey:
  secretName: me2me-awl-be-tmdb-api-key

# Additional volumeMounts on the output Deployment definition.
volumeMounts: {}

nodeSelector: {}

tolerations: []

affinity: {}