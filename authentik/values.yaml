authentik:
  postgresql:
    host: shared-postgres-cluster-rw.cnpg.svc.cluster
    port: 5432
    user: file:///postgres-creds/username
    password: file:///postgres-creds/password
  secret_key: file:///authentik-creds/secretKey
server:
  resources:
    limits:
      cpu: 200m
      memory: 2048Mi
    requests:
      cpu: 100m
      memory: 1536Mi
  service:
    type: NodePort
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-credentials
    - name: authentik-creds
      secret:
        secretName: authentik-secret-key
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
    - name: authentik-creds
      mountPath: /authentik-creds
      readOnly: true
worker:
  resources:
    limits:
      cpu: 200m
      memory: 2048Mi
    requests:
      cpu: 100m
      memory: 1536Mi
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-credentials
    - name: authentik-creds
      secret:
        secretName: authentik-secret-key
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
    - name: authentik-creds
      mountPath: /authentik-creds
      readOnly: true