apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: me2me-awl-be-tmdb-api-key
  namespace: me2me-awl
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: me2me-awl-be-tmdb-api-key
  data:
    - secretKey: TMDB_API_KEY
      remoteRef:
        key: secrets/me2me-awl/tmdb-api-key
        property: tmdb-api-key