---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-root-credentials
  namespace: mongodb
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: mongodb-root-credentials
  data:
  - secretKey: password
    remoteRef:
      key: secrets/mongodb/rootUser
      property: password