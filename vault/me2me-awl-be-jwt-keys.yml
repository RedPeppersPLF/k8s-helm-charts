apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: me2me-awl-be-jwt-keys
  namespace: me2me-awl
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: me2me-awl-be-jwt-keys
  data:
    - secretKey: public-key
      remoteRef:
        key: secrets/me2me-awl/jwt-keys
        property: public-key
    - secretKey: private-key
      remoteRef:
        key: secrets/me2me-awl/jwt-keys
        property: private-key