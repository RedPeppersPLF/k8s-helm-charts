apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-external-secret
  namespace: me2me-awl
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: ghcr-creds
    template:
      type: kubernetes.io/dockerconfigjson
  data:
  - secretKey: .dockerconfigjson
    remoteRef:
      key: secrets/artifacts/ghcr
      property: .dockerconfigjson
